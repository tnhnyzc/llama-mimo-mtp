name: CI (cann)

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  disabled:
    name: CANN build disabled
    runs-on: ubuntu-24.04
    steps:
      - name: Skip CANN build
        run: echo "CANN CI is disabled for this fork."
